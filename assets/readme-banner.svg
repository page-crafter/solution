    <path d="M64 74 h22 M64 88 h16" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

    <text x="126" y="72" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif"
