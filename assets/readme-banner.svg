<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="420" viewBox="0 0 1500 420" role="img" aria-labelledby="title desc">
  <title id="title">Page Crafter</title>
  <desc id="desc">Banner for Page Crafter, an AI-assisted Confluence documentation manager.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbf8"/>
      <stop offset="45%" stop-color="#edf7f3"/>
      <stop offset="100%" stop-color="#f8f3e6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f9d8a"/>
      <stop offset="55%" stop-color="#3578e5"/>
      <stop offset="100%" stop-color="#e3a72f"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#22332f" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#18322f" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1500" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1500" height="420" rx="30" fill="url(#grid)"/>

  <path d="M-40 320 C 190 228, 350 398, 560 300 S 930 110, 1190 205 1430 180, 1550 86"
