server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect all nginx temp paths to /tmp (required for read-only root filesystem)
    client_body_temp_path  /tmp/client_body_temp 1 2;
    proxy_temp_path        /tmp/proxy_temp 1 2;
    fastcgi_temp_path      /tmp/fastcgi_temp 1 2;
    uwsgi_temp_path        /tmp/uwsgi_temp 1 2;
    scgi_temp_path         /tmp/scgi_temp 1 2;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cache hashed assets forever, HTML never
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
